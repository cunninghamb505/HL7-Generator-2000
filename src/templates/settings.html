{% extends "base.html" %}
{% block title_suffix %} - Settings{% endblock %}

{% block content %}
<div class="page-header">
    <h2>Settings</h2>
</div>

<div class="settings-container">
    <div class="form-card">
        <h3>Simulation Control</h3>
        <div class="form-row">
            <label>Message Rate (msgs/min):
                <input type="number" id="setting-rate" value="5" min="0.1" max="120" step="0.5">
            </label>
            <button class="btn btn-primary" onclick="applyRate()">Apply</button>
        </div>
    </div>

    <div class="form-card">
        <h3>System Information</h3>
        <div id="system-info">Loading...</div>
    </div>

    <div class="form-card">
        <h3>Supported Message Types</h3>
        <div id="message-types-info">Loading...</div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    loadSettings();
</script>
{% endblock %}
